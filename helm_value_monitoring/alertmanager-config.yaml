alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: '${SLACK_WEBHOOK_URL}'

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      # Đổi receiver mặc định sang một kênh Slack chung
      receiver: 'slack-default'
      routes:
        - match:
            severity: critical
          receiver: 'slack-critical'
          continue: true
        - match:
            severity: warning
          receiver: 'slack-warnings'
        - match_re:
            service: ^(api|web)$
          receiver: 'team-backend'

    receivers:
      # 1. Receiver mặc định
      - name: 'slack-default'
        slack_configs:
          - channel: '#alerts-general' # Kênh nhận các cảnh báo không thuộc phân loại nào
            send_resolved: true
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}*Description:* {{ .Annotations.description }}{{ end }}'

      # 2. Receiver cho cảnh báo Critical (thay cho PagerDuty)
      - name: 'slack-critical'
        slack_configs:
          - channel: '#alerts-critical'
            send_resolved: true
            color: 'danger' # Hiện viền đỏ trên Slack
            title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      # 3. Receiver cho cảnh báo Warning
      - name: 'slack-warnings'
        slack_configs:
          - channel: '#alerts-warning'
            send_resolved: true
            color: 'warning' # Hiện viền vàng trên Slack
            title: '⚠️ WARNING: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      # 4. Receiver riêng cho team backend
      - name: 'team-backend'
        slack_configs:
          - channel: '#backend-alerts'
            send_resolved: true
            title: '{{ .Status | toUpper }} (Backend): {{ .CommonLabels.alertname }}'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'cluster', 'service']
