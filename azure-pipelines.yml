name: MERN CICD - $(Build.BuildId)

trigger:
  branches:
    include:
      - side-branch
  paths:
    exclude:
      - README.md
      - docs/*

pr: none

parameters:
  - name: AgentPool
    type: string
    default: 'vbox-k8s'
  - name: ServiceName
    type: string
    default: 'mern-app'
  - name: Namespace
    type: string
    default: 'mern-app'

variables:
  - group: mern-app-dev                      # CR_SERVER, INGRESS_HOST + secrets: DOCKERHUB_TOKEN
                                             # (push + regcred), JWT_SECRET, MONGO_URI (rendered
                                             # into the mern-app-secrets Secret by the chart)
  - name: imageRepository
    value: 'web-app-mern'
  - name: imageTag
    value: '$(Build.SourceVersion)'          # git SHA — same tag scheme as old CI
  - name: helmChartPath
    value: 'k8s-helm/mern-app'
  - name: valuesTokenized
    value: 'k8s-helm/mern-app/values.tokenized.yaml'

stages:
  # ------------------------------------------------------------------ Security
  - stage: Security
    displayName: Security check
    jobs:
      - job: backend_audit
        displayName: Backend security audit
        pool:
          name: ${{ parameters.AgentPool }}
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node 18
            inputs:
              versionSpec: '18.x'
          - script: npm ci
            displayName: Install backend deps
          - script: npm audit --audit-level=high
            displayName: npm audit (high)

      - job: frontend_lint_build
        displayName: Frontend lint and build
        pool:
          name: ${{ parameters.AgentPool }}
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node 18
            inputs:
              versionSpec: '18.x'
          - script: npm ci
            workingDirectory: client
            displayName: Install frontend deps
          - script: npm run lint
            workingDirectory: client
            displayName: Lint frontend
          - script: npm run build
            workingDirectory: client
            displayName: Build frontend

  # --------------------------------------------------------------- Build & push
  - stage: BuildPush
    displayName: Build & push images
    dependsOn: Security                       # implicit condition: succeeded()
    jobs:
      - job: build_push
        displayName: Build & push backend + frontend
        pool:
          name: ${{ parameters.AgentPool }}
        steps:
          - checkout: self

          # Log in with the DOCKERHUB_TOKEN secret variable from the group. Map it
          # via env: (not $(...) macro) so the token stays off the command line.
          - script: echo "$DOCKERHUB_TOKEN" | docker login -u "$(CR_SERVER)" --password-stdin
            displayName: Docker Hub login
            env:
              DOCKERHUB_TOKEN: $(DOCKERHUB_TOKEN)

          - script: |
              set -euo pipefail
              IMG="$(CR_SERVER)/$(imageRepository)"
              docker build -t "$IMG:backend-$(imageTag)" -t "$IMG:backend-latest" -f Dockerfile .
              docker push "$IMG:backend-$(imageTag)"
              docker push "$IMG:backend-latest"
            displayName: Build & push backend

          - script: |
              set -euo pipefail
              IMG="$(CR_SERVER)/$(imageRepository)"
              docker build -t "$IMG:frontend-$(imageTag)" -t "$IMG:frontend-latest" -f client/Dockerfile client
              docker push "$IMG:frontend-$(imageTag)"
              docker push "$IMG:frontend-latest"
            displayName: Build & push frontend

          - script: docker logout
            displayName: Docker Hub logout
            condition: always()

  # -------------------------------------------------------------------- Deploy
  - stage: Deploy
    displayName: Helm deploy
    dependsOn: BuildPush                       # implicit condition: succeeded()
    jobs:
      - job: HelmDeploy
        pool:
          name: ${{ parameters.AgentPool }}
        steps:
          - checkout: self
            clean: true

          - bash: |
              set -euo pipefail
              echo "Deploying imageTag=$(imageTag)"
            displayName: Show target image tag

          - bash: |
              set -euo pipefail
              OUT="$(Build.ArtifactStagingDirectory)/values.generated.yaml"
              sed -e "s|__crServer__|$(CR_SERVER)|g" \
                  -e "s|__IMAGE_TAG__|$(imageTag)|g" \
                  -e "s|__ingressHost__|$(INGRESS_HOST)|g" \
                  "$(valuesTokenized)" > "$OUT"
              if grep -nE '__[A-Za-z0-9_]+__' "$OUT"; then
                echo "##[error]Unreplaced tokens remain (see above)."; exit 1
              fi
            displayName: Render values (non-secret tokens)

          - bash: |
              set -euo pipefail
              # The chart renders mern-app-secrets from these two values. Fail
              # fast with a clear message instead of a cryptic helm error. An
              # unset ADO variable arrives as the literal macro text, so check
              # for that too.
              for v in JWT_SECRET MONGO_URI; do
                val="$(printenv "$v" || true)"
                if [ -z "$val" ] || [ "$val" = "\$($v)" ]; then
                  echo "##[error]$v is missing — add it as a SECRET variable to the mern-app-dev variable group (README §3.5)."
                  exit 1
                fi
              done
            displayName: Pre-check secret variables
            env:
              JWT_SECRET: $(JWT_SECRET)
              MONGO_URI: $(MONGO_URI)

          - bash: |
              set -euo pipefail
              NS="${{ parameters.Namespace }}"
              kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret docker-registry regcred -n "$NS" \
                --docker-server=https://index.docker.io/v1/ \
                --docker-username="$(CR_SERVER)" \
                --docker-password="$DOCKERHUB_TOKEN" \
                --dry-run=client -o yaml | kubectl apply -f -
            displayName: Create/refresh image pull Secret (regcred)
            env:
              DOCKERHUB_TOKEN: $(DOCKERHUB_TOKEN)

          - bash: |
              set -euo pipefail
              VALUES="$(Build.ArtifactStagingDirectory)/values.generated.yaml"
              # lint needs non-empty secret values (templates/secret.yaml uses
              # `required`) — dummies are fine, lint never touches the cluster.
              helm lint "$(helmChartPath)" -f "$VALUES" \
                --set-string secrets.jwtSecret=lint-only \
                --set-string secrets.mongoUri=lint-only
              # Real secrets ride in via --set-file + process substitution:
              # taken verbatim (no --set comma/quote parsing), never on the
              # command line, never written to disk.
              helm upgrade --install "${{ parameters.ServiceName }}" "$(helmChartPath)" \
                --namespace "${{ parameters.Namespace }}" --create-namespace \
                -f "$VALUES" \
                --set-file secrets.jwtSecret=<(printf '%s' "$JWT_SECRET") \
                --set-file secrets.mongoUri=<(printf '%s' "$MONGO_URI") \
                --history-max 5 --wait --timeout 5m
              kubectl get pods -n "${{ parameters.Namespace }}" \
                -l app.kubernetes.io/instance=${{ parameters.ServiceName }} -o wide
            displayName: helm upgrade --install
            env:
              JWT_SECRET: $(JWT_SECRET)
              MONGO_URI: $(MONGO_URI)

          - bash: rm -f "$(Build.ArtifactStagingDirectory)/values.generated.yaml"
            displayName: Clean up rendered values
            condition: always()
