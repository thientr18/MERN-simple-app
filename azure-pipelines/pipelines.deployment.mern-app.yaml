# CD (deploy only) to a VirtualBox k8s cluster via a self-hosted agent.
# GitHub Actions builds/pushes images, then queues this pipeline (imageTag=<sha>).
# No build, no secrets here: app secrets come from the mern-app-secrets k8s Secret.
#
# Variable group "mern-app-dev": CR_SERVER, INGRESS_HOST (both non-secret).
# One-time cluster setup before first deploy:
#   kubectl create namespace mern-app
#   kubectl create secret generic mern-app-secrets -n mern-app \
#     --from-literal=JWT_SECRET='<random>' \
#     --from-literal=MONGO_URI='mongodb://mern-app-mongodb:27017/mern-app'

name: MERN App CD - $(Build.BuildId)

trigger: none   # started only by the GitHub CI handoff (or a manual run)
pr: none

parameters:
  - name: imageTag
    displayName: Image tag to deploy (git SHA from CI)
    type: string
    default: 'latest'
  - name: AgentPool
    type: string
    default: 'vbox-k8s'
  - name: ServiceName
    type: string
    default: 'mern-app'
  - name: Namespace
    type: string
    default: 'mern-app'

variables:
  - group: mern-app-dev
  - name: helmChartPath
    value: 'k8s-helm/mern-app'
  - name: valuesTokenized
    value: 'k8s-helm/mern-app/values.tokenized.yaml'

stages:
  - stage: Deploy
    jobs:
      - job: HelmDeploy
        pool:
          name: ${{ parameters.AgentPool }}
        steps:
          - checkout: self
            clean: true

          - bash: |
              set -euo pipefail
              echo "Deploying imageTag=${{ parameters.imageTag }}"
              [ "${{ parameters.imageTag }}" != "latest" ] || \
                echo "##[warning]imageTag is the 'latest' default; a real CI run passes a git SHA."
            displayName: Show target image tag

          - bash: |
              set -euo pipefail
              OUT="$(Build.ArtifactStagingDirectory)/values.generated.yaml"
              sed -e "s|__crServer__|$(CR_SERVER)|g" \
                  -e "s|__IMAGE_TAG__|${{ parameters.imageTag }}|g" \
                  -e "s|__ingressHost__|$(INGRESS_HOST)|g" \
                  "$(valuesTokenized)" > "$OUT"
              if grep -nE '__[A-Za-z0-9_]+__' "$OUT"; then
                echo "##[error]Unreplaced tokens remain (see above)."; exit 1
              fi
            displayName: Render values (non-secret tokens)

          - bash: |
              set -euo pipefail
              NS="${{ parameters.Namespace }}"
              # secretKeyRef: pods can't start without this Secret. Fail fast
              # rather than wait out a 5-minute helm timeout.
              if ! kubectl get secret mern-app-secrets -n "$NS" >/dev/null 2>&1; then
                echo "##[error]Secret 'mern-app-secrets' missing in namespace '$NS' — create it first (see file header)."
                exit 1
              fi
            displayName: Pre-check k8s Secret

          - bash: |
              set -euo pipefail
              VALUES="$(Build.ArtifactStagingDirectory)/values.generated.yaml"
              helm lint "$(helmChartPath)" -f "$VALUES"
              helm upgrade --install "${{ parameters.ServiceName }}" "$(helmChartPath)" \
                --namespace "${{ parameters.Namespace }}" --create-namespace \
                -f "$VALUES" --history-max 5 --wait --timeout 5m
              kubectl get pods -n "${{ parameters.Namespace }}" \
                -l app.kubernetes.io/instance=${{ parameters.ServiceName }} -o wide
            displayName: helm upgrade --install

          - bash: rm -f "$(Build.ArtifactStagingDirectory)/values.generated.yaml"
            displayName: Clean up rendered values
            condition: always()
