name: Deploy Monitoring Stack

on:
  workflow_run:
    workflows: ["Deploy to Local Kubernetes"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  HELM_MONITOR_PATH: ./helm_value_monitoring

jobs:
  deploy-monitoring:
    name: Deploy Prometheus and Grafana
    environment: ENV
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux]
    env:
      HELM_CACHE_HOME: /tmp/.helm/cache
      HELM_CONFIG_HOME: /tmp/.helm/config
      HELM_DATA_HOME: /tmp/.helm/data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        shell: bash
        run: |
          set -euo pipefail
          curl -L --max-time 120 -o /tmp/kubectl https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl
          chmod +x /tmp/kubectl
          sudo mv /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Setup kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Substitute secrets in alertmanager config
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set"
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import os

          source = Path("${{ env.HELM_MONITOR_PATH }}/alertmanager-config.yaml")
          target = Path("/tmp/alertmanager-config.yaml")
          content = source.read_text()
          content = content.replace("${SLACK_WEBHOOK_URL}", os.environ["SLACK_WEBHOOK_URL"])
          target.write_text(content)
          PY
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Add and update Prometheus Helm repo
        shell: bash
        run: |
        
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --timeout 5m
          helm repo update

      - name: Deploy monitoring stack
        shell: bash
        run: |
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f "${{ env.HELM_MONITOR_PATH }}/prometheus-values.yaml" \
            -f "${{ env.HELM_MONITOR_PATH }}/grafana-values.yaml" \
            -f /tmp/alertmanager-config.yaml \
            --wait --timeout 10m --atomic
      
      - name: Deploy custom alert and dashboard
        shell: bash
        run: |
          kubectl -n monitoring apply -f "${{ env.HELM_MONITOR_PATH }}/service-monitor.yaml"
          kubectl -n monitoring apply -f "${{ env.HELM_MONITOR_PATH }}/custom-alerts.yaml"
          kubectl -n monitoring apply -f "${{ env.HELM_MONITOR_PATH }}/grafana-dashboard-configmap.yaml"