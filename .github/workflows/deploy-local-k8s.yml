name: Deploy to Local Kubernetes

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override (default: current commit SHA)"
        required: false
        default: ""

env:
  IMAGE_REPOSITORY: web-app-mern
  HELM_CHART_PATH: ./helm

jobs:
  deploy:
    environment: ENV
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Setup kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with Helm
        shell: bash
        run: |
          helm upgrade --install "${{ secrets.HELM_RELEASE }}" "${{ env.HELM_CHART_PATH }}" \
            --namespace "${{ secrets.K8S_NAMESPACE }}" \
            --create-namespace \
            --set backend.image.repository="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}" \
            --set backend.image.tag="backend-${{ steps.vars.outputs.tag }}" \
            --set frontend.image.repository="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}" \
            --set frontend.image.tag="frontend-${{ steps.vars.outputs.tag }}" \
            --wait --timeout 5m
