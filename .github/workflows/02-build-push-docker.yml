name: Build and Push Images

on:
  workflow_run:
    workflows: ["Security Check"]
    types: [completed]
    branches: [main]

env:
  IMAGE_REPOSITORY: web-app-mern

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        run: |
          [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] || (echo "DOCKERHUB_TOKEN is empty" && exit 1)
          [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] || (echo "DOCKERHUB_USERNAME is empty" && exit 1)

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:backend-${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:frontend-${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
