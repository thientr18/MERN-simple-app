name: Deploy Monitoring Stack

on:
  push:
    branches: [test-monitoring-only]
  workflow_dispatch:

env:
  HELM_MONITOR_PATH: ./helm_value_monitoring

jobs:
  deploy-monitoring:
    name: Deploy Prometheus and Grafana
    environment: ENV
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Setup kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Substitute secrets in alertmanager config
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set"
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import os

          source = Path("${{ env.HELM_MONITOR_PATH }}/alertmanager-config.yaml")
          target = Path("/tmp/alertmanager-config.yaml")
          content = source.read_text()
          content = content.replace("${SLACK_WEBHOOK_URL}", os.environ["SLACK_WEBHOOK_URL"])
          target.write_text(content)
          PY
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Add and update Prometheus Helm repo
        shell: bash
        run: |
          set -euo pipefail
          REPO_URL="https://prometheus-community.github.io/helm-charts"

          for attempt in 1 2 3; do
            echo "[$attempt/3] Checking Helm repo reachability..."
            if curl -fsSL --max-time 30 "$REPO_URL/index.yaml" > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Cannot reach $REPO_URL from this runner. Check DNS/firewall/proxy settings."
              exit 1
            fi

            sleep 15
          done

          helm repo add prometheus-community "$REPO_URL" --force-update --timeout 15m

          for attempt in 1 2 3; do
            echo "[$attempt/3] Updating Helm repositories..."
            if helm repo update; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "helm repo update failed after 3 attempts"
              exit 1
            fi

            sleep 15
          done

      - name: Deploy monitoring stack
        shell: bash
        run: |
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f "${{ env.HELM_MONITOR_PATH }}/prometheus-values.yaml" \
            -f "${{ env.HELM_MONITOR_PATH }}/grafana-values.yaml" \
            -f /tmp/alertmanager-config.yaml \
            --wait --timeout 10m --atomic
      
      - name: Deploy custom alert and dashboard
        shell: bash
        run: |
          kubectl -n monitoring apply -f "${{ env.HELM_MONITOR_PATH }}/service-monitor.yaml"
          kubectl -n monitoring apply -f "${{ env.HELM_MONITOR_PATH }}/custom-alerts.yaml"
          kubectl -n monitoring apply -f "${{ env.HELM_MONITOR_PATH }}/grafana-dashboard-configmap.yaml"

      - name: Post-deployment check
        shell: bash
        run: |
          echo "Checking Prometheus and Grafana pods status..."
          kubectl -n monitoring get pods -l release=prometheus -o jsonpath='{.items[*].status.phase}' | grep -q "Running" || (echo "Prometheus pods are not running" && exit 1)
          kubectl -n monitoring get pods -l release=prometheus-grafana -o jsonpath='{.items[*].status.phase}' | grep -q "Running" || (echo "Grafana pods are not running" && exit 1)


