# CD values — the pipeline replaces the tokens below, then runs helm upgrade.
# Tokens (non-secret): __crServer__, __IMAGE_TAG__ (git SHA from CI), __ingressHost__.
# Secrets are NOT here — JWT_SECRET/MONGO_URI come from the mern-app-secrets
# k8s Secret (see backend.env). Do not deploy this file directly.

backend:
  enabled: true
  replicaCount: 1

  image:
    repository: "__crServer__/web-app-mern"
    tag: backend-__IMAGE_TAG__
    pullPolicy: IfNotPresent

  # The Docker Hub repo is private — nodes authenticate with the regcred
  # Secret, which the pipeline creates/refreshes on every deploy (§3.1 for
  # the manual bring-up copy).
  imagePullSecrets:
    - name: regcred

  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 4000
    name: http

  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 4000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  env:
    - name: PORT
      value: "4000"
    # Secrets from the mern-app-secrets Secret (never in git or the pipeline).
    - name: MONGO_URI
      valueFrom:
        secretKeyRef:
          name: mern-app-secrets
          key: MONGO_URI
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: mern-app-secrets
          key: JWT_SECRET

frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: "__crServer__/web-app-mern"
    tag: frontend-__IMAGE_TAG__
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: regcred

  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 80
    name: http

  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# In-cluster MongoDB. Set enabled: false and repoint MONGO_URI (in the Secret)
# to use MongoDB Atlas or an external server instead.
mongodb:
  enabled: true
  replicaCount: 1

  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent

  service:
    enabled: true
    type: ClusterIP
    port: 27017
    targetPort: 27017
    name: mongo

  livenessProbe:
    tcpSocket:
      port: 27017
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    tcpSocket:
      port: 27017
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # emptyDir = data lost on reschedule (OK for dev/test; use a PVC to persist).
  volumeMounts:
    - name: data
      mountPath: /data/db
  volumes:
    - name: data
      emptyDir: {}

# Single host, path-based routing: the SPA calls the API with relative
# /api/v1/... URLs, so /api must land on the backend service.
ingress:
  enabled: true
  className: "nginx"
  host: "__ingressHost__"
  # Leave empty for plain HTTP on the vbox cluster (no cert-manager).
  tlsSecret: ""
  # clusterIssuer: "letsencrypt-prod"
  paths:
    - path: /api
      component: backend
    - path: /
      component: frontend
