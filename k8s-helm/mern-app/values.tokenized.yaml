# =============================================================================
# Tokenized values for CD — DO NOT deploy this file directly.
# The Azure DevOps pipeline replaces the tokens below before `helm upgrade`:
#   __crServer__      -> container registry / Docker Hub namespace (e.g. thientran03)
#   BuildID           -> $(Build.BuildId) of the pipeline run
#   __ingressHost__   -> public hostname of the app (e.g. mern.local)
#   __MONGO_URI__     -> MongoDB connection string   (secret, from variable group)
#   __JWT_SECRET__    -> JWT signing secret          (secret, from variable group)
# Image naming follows the existing GitHub CI convention: one repository
# (web-app-mern) with backend-<id> / frontend-<id> tags.
# =============================================================================

backend:
  enabled: true
  replicaCount: 1

  image:
    repository: "__crServer__/web-app-mern"
    tag: backend-BuildID
    pullPolicy: IfNotPresent

  # Uncomment when pulling from a private registry (create the secret first):
  # imagePullSecrets:
  #   - name: regcred

  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 4000
    name: http

  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 4000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  env:
    # ------------------------------------------------------------------
    # NON-SECRET config — safe to commit.
    # ------------------------------------------------------------------
    - name: PORT
      value: "4000"

    # ------------------------------------------------------------------
    # SECRETS — keep as tokens, supplied by the ADO variable group
    # (mern-app-<env>). Do NOT hardcode real values here.
    # ------------------------------------------------------------------
    - name: MONGO_URI
      value: "__MONGO_URI__"
    - name: JWT_SECRET
      value: "__JWT_SECRET__"

frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: "__crServer__/web-app-mern"
    tag: frontend-BuildID
    pullPolicy: IfNotPresent

  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 80
    name: http

  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# In-cluster MongoDB for the vbox cluster. Set enabled: false and point
# __MONGO_URI__ at MongoDB Atlas / an external server if preferred.
mongodb:
  enabled: true
  replicaCount: 1

  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent

  service:
    enabled: true
    type: ClusterIP
    port: 27017
    targetPort: 27017
    name: mongo

  livenessProbe:
    tcpSocket:
      port: 27017
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    tcpSocket:
      port: 27017
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # WARNING: emptyDir loses data when the pod is rescheduled. Fine for
  # dev/test on the vbox cluster; switch to a PersistentVolumeClaim for
  # anything that must survive restarts (see RUNBOOK-cicd-vbox.md).
  volumeMounts:
    - name: data
      mountPath: /data/db
  volumes:
    - name: data
      emptyDir: {}

# Single host, path-based routing: the SPA calls the API with relative
# /api/v1/... URLs, so /api must land on the backend service.
ingress:
  enabled: true
  className: "nginx"
  host: "__ingressHost__"
  # Leave empty for plain HTTP on the vbox cluster (no cert-manager).
  tlsSecret: ""
  # clusterIssuer: "letsencrypt-prod"
  paths:
    - path: /api
      component: backend
    - path: /
      component: frontend
