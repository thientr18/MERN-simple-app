{{- $components := list "backend" "frontend" "mongodb" -}}
{{- range $name := $components }}
{{- $config := index $.Values $name -}}
{{- if and $config $config.enabled $config.service $config.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mern-app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "mern-app.labels" (dict "Values" $.Values "Release" $.Release "Chart" $.Chart "name" $name) | nindent 4 }}
spec:
  type: {{ $config.service.type | default "ClusterIP" }}
  ports:
    - port: {{ $config.service.port }}
      targetPort: {{ $config.service.targetPort | default $config.service.port }}
      protocol: {{ $config.service.protocol | default "TCP" }}
      name: {{ $config.service.name | default "http" }}
      {{- if $config.service.nodePort }}
      nodePort: {{ $config.service.nodePort }}
      {{- end }}
  selector:
    {{- include "mern-app.selectorLabels" (dict "Values" $.Values "Release" $.Release "Chart" $.Chart "name" $name) | nindent 4 }}
{{- end }}
{{- end }}
