{{- $s := .Values.secrets -}}
{{- if and $s $s.create }}
apiVersion: v1
kind: Secret
metadata:
  # Fixed name (not fullname-prefixed): backend env secretKeyRefs in the
  # values files reference it literally.
  name: {{ $s.name | default "mern-app-secrets" }}
  labels:
    {{- include "mern-app.labels" (dict "Values" .Values "Release" .Release "Chart" .Chart "name" "secrets") | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ required "secrets.jwtSecret is required when secrets.create=true — the pipeline injects it from the mern-app-dev variable group (--set-file)" $s.jwtSecret | b64enc }}
  MONGO_URI: {{ required "secrets.mongoUri is required when secrets.create=true — the pipeline injects it from the mern-app-dev variable group (--set-file)" $s.mongoUri | b64enc }}
{{- end }}
